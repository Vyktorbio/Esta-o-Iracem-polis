<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Estudos</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#050805}
body{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;color:#ccc;display:flex;flex-direction:column}
.top-bar{background:linear-gradient(180deg,#0c100c,#080c08);padding:6px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a2a1a;flex-shrink:0;min-height:44px;z-index:50;flex-wrap:wrap;gap:6px}
.top-bar h1{font-size:13px;font-weight:700;color:#d0d0d0;letter-spacing:1px}
.top-bar-sub{font-size:7px;color:#3a5a3a;letter-spacing:2.5px;font-weight:600;text-transform:uppercase}
.top-bar-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.top-bar-info{font-size:11px;color:#789;white-space:nowrap;margin-right:4px}
@media (max-width:600px){
  .top-bar{flex-direction:column;align-items:stretch;padding:6px 10px}
  .top-bar>div:first-child{text-align:left}
  .top-bar-right{justify-content:flex-start;flex-wrap:wrap}
}
.btn-sm{background:#111811;border:1px solid #1e2e1e;color:#5a8a5a;padding:3px 10px;border-radius:4px;font-size:9px;cursor:pointer;font-weight:600;letter-spacing:1px}
.btn-sm:hover{background:#1a2a1a}
.btn-sm.active{background:#1e3a1e;color:#8c8}
.map-container{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#050805}
.map-inner{position:relative;display:inline-block;line-height:0}
.map-inner img{display:block;max-width:100vw;max-height:calc(100vh - 34px);width:auto;height:auto}
.map-inner svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.map-inner svg polygon{pointer-events:all}

.alert-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:#ff5252;box-shadow:0 0 8px rgba(255,82,82,0.8);animation:pulse 1.5s infinite;pointer-events:none}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(5px)}
.overlay.open{display:flex}
.panel{background:#0c140c;border-radius:14px;width:440px;max-width:94vw;max-height:92vh;overflow-y:auto;color:#ddd;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.panel-header{padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:center}
.panel-qid{font-size:28px;font-weight:800;color:#fff;line-height:1}
.panel-qlbl{font-size:10px;font-weight:700;letter-spacing:2px}
.panel-sbox{border-radius:8px;padding:8px 14px;text-align:center}
.panel-scode{font-size:20px;font-weight:800;line-height:1}
.panel-slbl{font-size:8px;margin-top:3px;opacity:.8;max-width:100px}
.panel-body{padding:14px 20px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px}
.info-l{font-size:9px;color:#555;letter-spacing:1.5px;font-weight:600;margin-bottom:2px}
.info-v{font-size:13px;font-weight:600;line-height:1.2}
.prog-wrap{margin-top:16px}.prog-top{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-t{font-size:9px;color:#555;letter-spacing:1.5px;font-weight:600}.prog-p{font-size:9px;color:#666}
.prog-bar{height:5px;background:#1a2a1a;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.fen-wrap{margin-top:16px}.fen-title{font-size:9px;color:#555;letter-spacing:1.5px;font-weight:600;margin-bottom:6px}
.fen-row{display:flex;gap:2px;flex-wrap:wrap}
.fen-item{flex:1;min-width:32px;padding:4px 2px;border-radius:4px;text-align:center;background:#111;border:1px solid #222}
.fen-code{font-size:8px;font-weight:700}.fen-dap{font-size:7px;margin-top:2px}

.studies-wrap{margin-top:18px;border-top:1px solid #1a2a1a;padding-top:14px}
.studies-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.studies-title{font-size:10px;color:#5a8a5a;letter-spacing:2px;font-weight:700}
.studies-add{background:#1a2a1a;color:#8a8;border:1px solid rgba(76,175,80,.27);padding:4px 10px;border-radius:5px;font-size:10px;cursor:pointer;font-weight:700;letter-spacing:0.5px}
.studies-add:hover{filter:brightness(1.2)}
.study-card{background:#0a110a;border:1px solid #1a2a1a;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.study-card.next-alert{border-color:#ff5252;background:rgba(255,82,82,0.05)}
.study-card.next-soon{border-color:#ffb300;background:rgba(255,179,0,0.04)}
.study-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.study-name{font-size:12px;font-weight:700;color:#ddd;flex:1;line-height:1.2}
.study-actions{display:flex;gap:4px}
.study-btn{background:transparent;border:none;color:#666;cursor:pointer;font-size:11px;padding:2px 6px;border-radius:4px}
.study-btn:hover{background:#1a2a1a;color:#aaa}
.study-btn.del:hover{color:#ff5252}
.study-meta{font-size:9px;color:#666;margin-top:4px;line-height:1.4}
.study-meta b{color:#8a8;font-weight:600}
.study-next{margin-top:6px;padding:5px 8px;border-radius:5px;font-size:10px;display:flex;justify-content:space-between;align-items:center}
.next-apl{background:rgba(66,165,245,0.1);color:#64b5f6}
.next-eval{background:rgba(255,179,0,0.1);color:#ffb74d}
.next-today{background:rgba(255,82,82,0.15);color:#ff8a80;font-weight:700}
.next-overdue{background:rgba(255,82,82,0.25);color:#ff5252;font-weight:700}

.study-timeline{margin-top:6px;display:flex;gap:3px;flex-wrap:wrap}
.tl-item{padding:3px 6px;border-radius:4px;font-size:9px;font-weight:600;background:#111;border:1px solid #222;color:#888}
.tl-item.done{background:#1a2a1a;color:#5a8a5a;border-color:#2e4a2e}
.tl-item.today{background:rgba(255,82,82,0.2);color:#ff8a80;border-color:#ff5252}
.tl-item.soon{background:rgba(255,179,0,0.15);color:#ffb74d;border-color:#ffb300}

.panel-btns{padding:0 20px 14px;display:flex;gap:8px}
.p-btn{flex:1;padding:8px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;border:none}
.p-btn:hover{filter:brightness(1.2)}
.p-btn-edit{background:#1a2a1a;color:#8a8;border:1px solid rgba(76,175,80,.27)}
.p-btn-close{background:#1a1a1a;color:#888;border:1px solid #2a2a2a}

.edit-panel{background:#0c140c;border:1px solid #2a3a2a;border-radius:14px;padding:22px;width:400px;max-width:94vw;max-height:92vh;overflow-y:auto;color:#ddd;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.edit-title{font-size:10px;color:#5a8a5a;font-weight:700;letter-spacing:2px}
.edit-id{font-size:24px;font-weight:800;color:#fff;margin-bottom:6px}
.edit-subtitle{font-size:11px;color:#666;margin-bottom:4px}
.e-lbl{display:block;font-size:9px;color:#5a8a5a;margin-top:12px;margin-bottom:3px;letter-spacing:1.5px;font-weight:700}
.e-inp{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #1e2e1e;background:#060a06;color:#ddd;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box}
.e-inp:focus{border-color:#3a5a3a}
.e-row{display:flex;gap:8px}
.e-row > div{flex:1}
.e-hint{font-size:9px;color:#555;margin-top:3px;font-style:italic}
.e-btns{display:flex;gap:8px;margin-top:18px}
.e-btn{flex:1;padding:9px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;border:none}
.e-btn:hover{filter:brightness(1.2)}.e-save{background:#1e3a1e;color:#8c8}.e-cancel{background:#222;color:#888}
.e-btn-del{background:#3a1e1e;color:#f88;margin-top:12px;width:100%;padding:8px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;border:none}

.eval-dates{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.eval-chip{background:#060a06;border:1px solid #1e2e1e;border-radius:5px;padding:4px 8px;font-size:11px;color:#ddd;display:flex;align-items:center;gap:6px}
.eval-chip-rm{background:none;border:none;color:#666;cursor:pointer;font-size:13px;padding:0;line-height:1}
.eval-chip-rm:hover{color:#ff5252}
.eval-add-row{display:flex;gap:6px;margin-top:6px}
.eval-add-row input{flex:1}
.eval-add-btn{background:#1a2a1a;color:#8a8;border:1px solid rgba(76,175,80,.27);padding:0 12px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:700}

.legend-panel{position:fixed;top:80px;left:8px;background:rgba(8,14,8,0.95);border:1px solid #1a2a1a;border-radius:10px;padding:12px;z-index:60;max-width:280px;display:none;backdrop-filter:blur(10px)}
.legend-panel.open{display:block}
.lg-title{font-size:9px;color:#555;letter-spacing:2px;font-weight:700;margin-bottom:6px}
.lg-crops{display:flex;flex-wrap:wrap;gap:3px}
.lg-crop{padding:2px 6px;border-radius:3px;font-size:8px;font-weight:600;display:inline-flex;align-items:center;gap:3px;border:1px solid rgba(255,255,255,0.1)}
.lg-dot{width:6px;height:6px;border-radius:2px;display:inline-block}
.lg-stages{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.lg-stage{display:flex;align-items:center;gap:2px;font-size:8px;color:#777}
.lg-bar{width:3px;height:12px;border-radius:1px;display:inline-block}

.agenda-panel{position:fixed;top:80px;right:8px;background:rgba(8,14,8,0.97);border:1px solid #1a2a1a;border-radius:10px;padding:14px;z-index:60;width:320px;max-width:94vw;max-height:75vh;overflow-y:auto;display:none;backdrop-filter:blur(10px)}
.agenda-panel.open{display:block}
.ag-title{font-size:11px;color:#8a8;letter-spacing:2px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.ag-close{background:none;border:none;color:#666;cursor:pointer;font-size:16px;padding:0}
.ag-group{margin-bottom:12px}
.ag-group-title{font-size:9px;color:#555;letter-spacing:1.5px;font-weight:700;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid #1a2a1a}
.ag-item{background:#0a110a;border:1px solid #1a2a1a;border-radius:6px;padding:8px 10px;margin-bottom:5px;cursor:pointer}
.ag-item:hover{background:#0e160e}
.ag-item.overdue{border-color:#ff5252}
.ag-item.today{border-color:#ff5252;background:rgba(255,82,82,0.08)}
.ag-item.soon{border-color:#ffb300}
.ag-item-top{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:2px}
.ag-item-qid{font-weight:800;color:#ddd}
.ag-item-date{font-size:10px;font-weight:700}
.ag-item-name{font-size:10px;color:#aaa}
.ag-item-type{font-size:8px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.ag-empty{font-size:10px;color:#555;text-align:center;padding:10px;font-style:italic}

/* ============ CSS NOVOS PAINÉIS ============ */
/* Painel de detalhe do estudo (tela cheia) */
.sd-overlay{position:fixed;inset:0;background:#080e08;display:none;z-index:1000;overflow-y:auto}
.sd-overlay.open{display:block}
.sd-panel{max-width:640px;margin:0 auto;padding:14px 14px 80px 14px;color:#d0d8d0}
.sd-header{display:flex;align-items:center;gap:10px;position:sticky;top:0;background:#080e08;padding:8px 0 14px;border-bottom:1px solid #1a2a1a;margin-bottom:12px;z-index:20;flex-wrap:wrap}
.sd-back{background:none;border:1px solid #2a3a2a;color:#8c8;padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer}
.sd-codigo{flex:1 1 140px;min-width:0;font-size:20px;font-weight:700;color:#afa;letter-spacing:0.3px;overflow-wrap:anywhere;line-height:1.15}
.sd-actions{display:flex;gap:6px}
.sd-meta{background:rgba(20,30,20,0.5);border:1px solid #1a2a1a;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px}
.sd-meta-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed #1a2a1a}
.sd-meta-item:last-child{border-bottom:none}
.sd-meta-lbl{color:#789;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
.sd-section{margin:14px 0}
.sd-section-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#789;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.sd-add{background:#1e3a1e;color:#afa;border:none;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;text-transform:none;letter-spacing:0}
.sd-descricao{background:rgba(20,30,20,0.5);border-left:3px solid #2a4a2a;padding:10px;border-radius:0 6px 6px 0;font-size:14px;color:#c0c8c0;line-height:1.5}
.sd-empty{color:#557;font-size:13px;padding:10px;background:rgba(10,15,10,0.5);border:1px dashed #1a2a1a;border-radius:6px;text-align:center}
.sd-next{padding:12px;border-radius:8px;margin:8px 0}
.sd-next.urgent{background:rgba(255,82,82,0.15);border:1px solid #ff5252}
.sd-next.soon{background:rgba(255,152,0,0.15);border:1px solid #ff9800}
.sd-next.normal{background:rgba(33,150,243,0.15);border:1px solid #4a8dd0}
.sd-next-lbl{font-size:10px;color:#789;text-transform:uppercase;letter-spacing:1px}
.sd-next-evt{font-size:15px;font-weight:600;margin:2px 0;color:#e0e8e0}
.sd-next-date{font-size:13px;color:#aab}

/* Tabela de tratamentos */
.trat-table{background:rgba(10,15,10,0.6);border:1px solid #1a2a1a;border-radius:8px;overflow:hidden}
.trat-head{display:grid;grid-template-columns:50px 1fr 80px 80px;gap:6px;padding:8px 10px;background:rgba(30,58,30,0.5);font-size:11px;text-transform:uppercase;color:#789;letter-spacing:0.5px}
.trat-row{display:grid;grid-template-columns:50px 1fr 80px 80px;gap:6px;padding:10px;border-top:1px solid #1a2a1a;font-size:13px;align-items:center}
.trat-id{font-weight:700;color:#afa}
.trat-obs{grid-column:1/-1;font-size:12px;color:#789;font-style:italic;padding-top:4px;border-top:1px dashed #1a2a1a;margin-top:4px}

/* Lista de eventos (aplicações / avaliações) */
.eventos-list{display:flex;flex-direction:column;gap:6px}
.evento-item{background:rgba(20,30,20,0.5);border:1px solid #1a2a1a;border-radius:8px;padding:10px}
.evento-head{display:flex;align-items:center;gap:8px}
.evento-tipo{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;letter-spacing:0.5px}
.evento-tipo.apl{background:#1e3a1e;color:#afa}
.evento-tipo.eval{background:#1e3a5e;color:#aaf}
.evento-data{flex:1;font-size:13px;color:#d0d8d0;font-weight:500}
.evento-del{background:none;border:none;color:#789;font-size:18px;cursor:pointer;padding:0 6px}
.evento-del:hover{color:#ff5252}
.evento-subtipo{font-size:12px;color:#c0c8c0;margin-top:4px;font-weight:500}
.evento-bbch{font-size:11px;color:#8a9;margin-top:4px}
.evento-obs{font-size:13px;color:#c0c8c0;margin-top:6px;padding-top:6px;border-top:1px dashed #1a2a1a;line-height:1.4}

.sd-danger-zone{margin-top:30px;padding-top:20px;border-top:1px solid #2a1a1a;text-align:center}
.btn-danger{background:#3a1a1a;color:#f88;border:1px solid #5a2a2a;padding:10px 20px;border-radius:6px;font-size:13px;cursor:pointer}
.btn-danger:hover{background:#4a2020}

/* Modal de edição de estudo */
.se-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:flex-start;justify-content:center;z-index:1100;overflow-y:auto;padding:20px 10px}
.se-overlay.open{display:flex}
.se-panel{background:#0d150d;border:1px solid #2a3a2a;border-radius:10px;max-width:500px;width:100%;padding:16px;color:#d0d8d0}
.se-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.se-head h3{margin:0;font-size:16px;color:#afa}
.se-x{background:none;border:none;color:#789;font-size:24px;cursor:pointer;padding:0 6px}
.se-field{margin-bottom:12px}
.se-field label{display:block;font-size:11px;text-transform:uppercase;color:#789;letter-spacing:0.5px;margin-bottom:4px}
.se-field .req{color:#f88}
.se-field input,.se-field select,.se-field textarea{width:100%;background:#050805;border:1px solid #2a3a2a;color:#d0d8d0;padding:8px 10px;border-radius:6px;font-family:inherit;font-size:14px;box-sizing:border-box}
.se-field textarea{resize:vertical;min-height:60px;line-height:1.4}
.se-codigo-input{font-size:16px!important;font-weight:600;letter-spacing:0.3px}
.se-row{display:flex;gap:8px;flex-wrap:wrap}
.se-row .se-field{flex:1;min-width:100px}
.se-section-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#afa;margin:16px 0 8px;border-top:1px solid #1a2a1a;padding-top:14px}
.se-trat{background:rgba(20,30,20,0.5);border:1px solid #1a2a1a;border-radius:8px;padding:10px;margin-bottom:8px;display:flex;flex-direction:column;gap:6px}
.se-trat-head{display:flex;justify-content:space-between;align-items:center}
.se-trat-id{font-weight:700;color:#afa;font-size:14px}
.se-trat-del{background:none;border:none;color:#789;font-size:20px;cursor:pointer}
.se-trat-del:hover{color:#ff5252}
.se-trat input{background:#050805;border:1px solid #2a3a2a;color:#d0d8d0;padding:6px 8px;border-radius:4px;font-size:13px}
.se-add-trat{background:#1e3a1e;color:#afa;border:1px dashed #2a4a2a;padding:10px;border-radius:6px;font-size:13px;cursor:pointer;width:100%;margin-bottom:12px}
.se-add-trat:hover{background:#25482a}
.se-empty{color:#557;font-size:13px;padding:10px;text-align:center;font-style:italic}
.se-actions{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid #1a2a1a}
.btn-save{flex:1;background:#1e3a1e;color:#afa;border:none;padding:10px;border-radius:6px;font-weight:600;cursor:pointer;font-size:14px}
.btn-save:hover{background:#25482a}
.btn-cancel{background:#222;color:#888;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;font-size:14px}

/* Botão export/import */
.toolbar-extra{position:fixed;bottom:14px;right:14px;display:flex;gap:6px;z-index:50}
.toolbar-extra button{background:rgba(20,30,20,0.9);color:#8c8;border:1px solid #2a3a2a;padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer;backdrop-filter:blur(10px)}
.toolbar-extra button:hover{background:rgba(30,45,30,0.95)}

/* Cards de estudo reescritos com destaque para código */
.study-card-v2{background:rgba(20,30,20,0.6);border:1px solid #1a2a1a;border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer;transition:border-color 0.2s}
.study-card-v2:hover{border-color:#2a4a2a}
.study-card-v2-codigo{font-size:15px;font-weight:700;color:#afa;letter-spacing:0.3px;margin-bottom:4px;word-break:break-all}
.study-card-v2-desc{font-size:12px;color:#789;margin-bottom:6px;line-height:1.3}
.study-card-v2-meta{display:flex;gap:10px;font-size:11px;color:#8a9;flex-wrap:wrap}
.study-card-v2-next{margin-top:6px;padding:6px 8px;border-radius:4px;font-size:11px;display:flex;justify-content:space-between}
.study-card-v2-next.urgent{background:rgba(255,82,82,0.2);color:#faa}
.study-card-v2-next.soon{background:rgba(255,152,0,0.15);color:#fc8}
.study-card-v2-next.normal{background:rgba(33,150,243,0.12);color:#8bf}


/* ============ CSS NOVOS PAINÉIS v3 ============ */

/* HOJE e busca são .btn-sm normais + cores especiais quando urgente */
.btn-today{display:inline-flex;align-items:center;gap:6px}
.btn-today.has-urgent{background:rgba(255,82,82,0.25)!important;border-color:#ff5252!important;color:#faa!important}
.btn-today.has-today{background:rgba(255,152,0,0.25)!important;border-color:#ff9800!important;color:#fc8!important}

<style id="proTheme">
/* ============================================================
   TEMA PROFISSIONAL — tokens + refinamentos (sobrepõe o acima)
   ============================================================ */
:root{
  --bg:#0a0e0c; --surface:#101613; --surface-2:#0c1210; --surface-3:#161e1a;
  --border:#26322b; --border-soft:#1a221d;
  --text:#e8efe9; --text-2:#9fb1a5; --text-3:#6d7f73;
  --accent:#37d684; --accent-d:#1f8a52; --accent-deep:#103225; --accent-soft:rgba(55,214,132,.13);
  --info:#5aa9e6; --warn:#f4b34d; --danger:#ff6b6b;
  --radius:14px; --radius-sm:11px; --pill:999px;
  --shadow:0 18px 54px rgba(0,0,0,.58); --shadow-sm:0 8px 26px rgba(0,0,0,.46);
  --font:-apple-system,'SF Pro Text','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
html,body{background:var(--bg)}
body{font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

/* ---- Header ---- */
.top-bar{background:linear-gradient(180deg,#0f1512,#0a0f0d);border-bottom:1px solid var(--border-soft);padding:9px 16px;box-shadow:0 1px 0 rgba(255,255,255,.02),0 6px 18px rgba(0,0,0,.25)}
.top-bar h1{font-size:15px;font-weight:800;letter-spacing:.4px;color:#f2f7f3}
.top-bar-sub{font-size:8px;color:var(--accent);opacity:.9;letter-spacing:3.2px;font-weight:700}
.top-bar-info{color:var(--text-3);font-weight:500;font-size:11px}

/* ---- Botões pequenos (HOJE / AGENDA / busca) ---- */
.btn-sm{background:var(--surface-3);border:1px solid var(--border);color:var(--text-2);border-radius:9px;padding:6px 12px;font-size:10px;letter-spacing:.6px;font-weight:700;transition:background .15s,border-color .15s,color .15s}
.btn-sm:hover{background:#1d2721;border-color:#33453a;color:var(--text)}
.btn-sm.active{background:var(--accent-deep);border-color:var(--accent-d);color:var(--accent)}
.today-badge{background:var(--accent-deep);color:var(--accent);border-radius:var(--pill);font-weight:800}

/* ---- Controles do Leaflet ---- */
.leaflet-bar{border:none!important;box-shadow:var(--shadow-sm)!important;border-radius:11px!important;overflow:hidden}
.leaflet-bar a{background:rgba(16,22,19,.92)!important;color:var(--text)!important;border-bottom:1px solid var(--border-soft)!important;width:34px;height:34px;line-height:34px;font-size:18px;backdrop-filter:blur(10px)}
.leaflet-bar a:hover{background:rgba(28,38,32,.96)!important;color:var(--accent)!important}
.leaflet-control-attribution{background:rgba(10,15,12,.6)!important;color:var(--text-3)!important;border-radius:7px 0 0 0;padding:2px 7px}
.leaflet-control-attribution a{color:var(--text-2)!important}
.leaflet-control-scale-line{background:rgba(16,22,19,.78)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-top:none;border-radius:0 5px 5px 0;font-weight:600}

/* ---- Dock de botões (NDVI / GPS / Menu) ---- */
.toolbar-extra{bottom:16px;right:16px;gap:9px}
.toolbar-extra button{background:rgba(15,21,18,.85);border:1px solid var(--border);color:var(--text);border-radius:13px;padding:11px 16px;font-size:13px;font-weight:600;letter-spacing:.2px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:var(--shadow-sm);transition:background .15s,border-color .15s,transform .07s}
.toolbar-extra button:hover{background:rgba(27,37,31,.95);border-color:#36473c}
.toolbar-extra button:active{transform:translateY(1px)}
.toolbar-extra button[onclick*="toggleNdvi"]{color:var(--accent);border-color:#244a36}
#menuBtn{color:var(--text-2)}

/* ---- Painéis (unifica superfícies) ---- */
.panel,.edit-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.ndvi-panel,.gr-panel{background:rgba(15,21,18,.97);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.overlay{background:rgba(4,7,5,.74);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px)}
.gr-title,.ndvi-panel .gr-title{color:var(--accent);letter-spacing:2px;font-size:11px}
.edit-title{color:var(--accent)}

/* ---- Inputs ---- */
.e-inp,.gr-ctl select,.search-box input,.se-field input,.se-field select,.se-field textarea{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:9px}
.e-inp:focus,.search-box input:focus,.se-field input:focus{border-color:var(--accent-d);outline:none}
.gr-ctl input[type=range]{accent-color:var(--accent)}
.loc-box input:focus,.loc-modal input:focus{border-color:var(--accent-d)!important;outline:none;box-shadow:0 0 0 2px var(--accent-soft)}
input:focus-visible,select:focus-visible,textarea:focus-visible{outline:none}

/* ---- Botões "verdes" -> emerald coeso ---- */
.gr-ok,.e-save,.btn-save,.today-card-quick,.se-add-trat,.sd-add{background:linear-gradient(180deg,#1f9a5d,#178048);color:#eafff2;border:none}
.gr-ok:hover,.e-save:hover,.btn-save:hover,.today-card-quick:hover{filter:brightness(1.08)}
.p-btn-edit,.studies-add,.eval-add-btn,.studies-add{background:var(--accent-soft);color:var(--accent);border:1px solid #244a36}
.ndvi-ix.on{background:var(--accent-deep);color:#bff3d4;border-color:var(--accent-d)}
.gr-cancel,.e-cancel,.btn-cancel,.p-btn-close{background:#1b211d;color:var(--text-2);border:1px solid var(--border)}
.gr-reset{background:#2a2418;color:#e0bd72;border:none}

/* ---- Rótulos das quadras (mais nítidos) ---- */
.q-label .q-id{font-weight:800;letter-spacing:.2px}
.q-ndvi{background:rgba(10,15,12,.82);border-color:var(--border)}

/* ---- NDVI: índices quebram linha (não estouram no mobile) ---- */
.ndvi-ixrow{flex-wrap:wrap}
.ndvi-ix{flex:1 1 44px;min-width:44px}
.ndvi-panel{top:auto;bottom:78px;left:12px;max-height:calc(100vh - 150px);overflow-y:auto}
.gr-panel{max-height:calc(100vh - 40px);overflow-y:auto}

/* ---- Multi-cultura ---- */
.e-cult-row{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:9px 10px;margin-bottom:8px}
.e-cult-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.e-cult-n{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--accent)}
.e-cult-del{background:none;border:none;color:#9a6a6a;font-size:14px;cursor:pointer;padding:0 4px;line-height:1}
.e-cult-del:hover{color:var(--danger)}
.e-add-cult{width:100%;margin-top:2px;background:var(--accent-soft);color:var(--accent);border:1px dashed #2c5a3e;border-radius:9px;padding:9px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}

.study-card-v2:hover,.search-item:hover,.ag-item:hover{border-color:#b9c8bf!important;background:#fbfcfa!important}
.study-card-v2-codigo,.trat-id,.today-card-estudo,.search-item-id{color:#14231b!important;font-weight:820!important}
.study-card-v2-desc,.study-card-v2-meta,.study-meta,.search-item-sub,.search-item-meta{color:var(--vm-muted-dark)!important}

/* Botões internos */
.studies-add,.sd-add,.se-add-trat,.eval-add-btn,.btn-save,.today-card-quick,.gr-ok,.e-save,.p-btn-edit{
  background:linear-gradient(180deg,#239b64,#1c7f51)!important;
  color:#fff!important;
  border:1px solid #197448!important;
  border-radius:9px!important;
  font-weight:780!important;
  box-shadow:0 6px 14px rgba(28,127,81,.18)!important;
}
.btn-cancel,.e-cancel,.gr-cancel,.p-btn-close,.today-back,.sd-back{
  background:#eef1ed!important;
  color:#334039!important;
  border:1px solid var(--vm-line-dark)!important;
  border-radius:9px!important;
}
.btn-danger,.measure-actions button.danger{background:#fff1ef!important;color:#b53d33!important;border-color:#e1a39c!important}

/* Telas cheias */
.today-overlay,.sd-overlay{background:#eef1ed!important;color:var(--vm-text-dark)!important}
.today-head,.sd-header{background:rgba(238,241,237,.94)!important;border-bottom:1px solid var(--vm-line-dark)!important;backdrop-filter:blur(16px)!important;-webkit-backdrop-filter:blur(16px)!important}
/* Botões do cabeçalho do estudo: contraste no header claro */
.sd-actions .btn-sm{background:#fff!important;color:#1f4d34!important;border:1px solid #cdd9d0!important;text-transform:none!important;letter-spacing:.1px!important}
.sd-actions .btn-sm:hover{background:#eef3ef!important;border-color:#9fc7ad!important;color:#15663c!important}
.sd-actions .btn-sm.active{background:rgba(31,138,82,.16)!important;color:#15663c!important;border-color:#58c98e!important}
/* Menus NDVI e Clima (mesma classe .ndvi-panel): contraste no painel claro */
.ndvi-panel .gr-title{color:#15663c!important}
.ndvi-panel .gr-ctl,.ndvi-panel .gr-ctl span{color:#3a4a42!important}
.ndvi-panel .gr-ctl select{background:#fff!important;color:#16201b!important;border:1px solid var(--vm-line-dark)!important}
.ndvi-status{color:#5a6b61!important}
.ndvi-ticks{color:#6a766e!important}
.ndvi-rank-title{color:#5a6b61!important}
.ndvi-rank-row{color:#26312b!important;border:1px solid transparent}
.ndvi-rank-row b{color:#15663c!important}
.ndvi-rank-row:hover{background:#eef3ef!important;border-color:#bcdcc8!important}
.ndvi-ix{background:#fff!important;color:#1f4d34!important;border:1px solid #cdd9d0!important}
.ndvi-ix.on{background:#1f8a52!important;color:#fff!important;border-color:#1f8a52!important}
.clima-card{background:#eef2ee!important;border:1px solid var(--vm-line-dark)!important}
.clima-card .lab{color:#5a6b61!important}
.clima-card .val,.clima-temp .t{color:#16201b!important}
.clima-card .val small,.clima-foot{color:#6a766e!important}
.ndvi-panel .gr-cancel{background:#fff!important;color:#26312b!important;border:1px solid var(--vm-line-dark)!important}
.res-title{font-size:11px;font-weight:800;color:#15663c;margin:9px 0 3px;letter-spacing:.2px}
.sd-descricao,.sd-empty,.today-empty,.se-empty{background:#fff!important;border-color:var(--vm-line-dark)!important;color:var(--vm-muted-dark)!important}
.trat-head{background:#edf2ee!important;color:var(--vm-muted-dark)!important}
.trat-row{border-top-color:var(--vm-line-dark)!important}

/* Busca */
.search-box input,.se-field input,.se-field select,.se-field textarea,.e-inp,.loc-box input{
  background:#fff!important;
  color:var(--vm-text-dark)!important;
  border:1px solid var(--vm-line-dark)!important;
  border-radius:9px!important;
}
.search-box input:focus,.se-field input:focus,.se-field select:focus,.se-field textarea:focus,.e-inp:focus,.loc-box input:focus{border-color:rgba(33,168,107,.65)!important;box-shadow:0 0 0 3px rgba(33,168,107,.12)!important}
.search-close{background:#fff!important;border:1px solid var(--vm-line-dark)!important;color:#59665f!important;border-radius:9px!important}

/* Sincronização */
.cloud-badge{
  bottom:72px!important;
  background:rgba(246,247,244,.92)!important;
  color:#334039!important;
  border:1px solid rgba(24,33,29,.14)!important;
  box-shadow:var(--vm-shadow-soft)!important;
  font-weight:760!important;
}
.cb-saving{color:#177a4c!important}.cb-error{color:var(--vm-danger)!important}.cb-offline{color:#86621b!important}

/* Menus injetados */
.main-menu button,.loc-mi{color:#26312b!important}
.main-menu button:hover,.loc-mi:hover{background:#edf2ee!important}
.loc-mi.on{background:#e4f2ea!important;color:#164f35!important}
.loc-mi .sub{color:var(--vm-muted-dark)!important}

	/* Medição fica alinhada ao novo visual */
	.measure-panel{background:rgba(17,23,21,.96)!important;border-color:rgba(255,255,255,.16)!important;border-radius:12px!important;box-shadow:var(--vm-shadow)!important;color:#fff!important}
	.measure-title{color:#7df0b4!important}
	.measure-x{color:#fff!important}
	.measure-kpi{border-color:rgba(255,255,255,.16)!important;background:rgba(255,255,255,.09)!important}
	.measure-kpi b{color:#fff!important}
	.measure-kpi.main b{color:#7df0b4!important}
	.measure-kpi span,.measure-note{color:rgba(255,255,255,.78)!important}
	.measure-actions button{border-radius:8px!important;background:rgba(255,255,255,.10)!important;color:#fff!important;border-color:rgba(255,255,255,.18)!important}
	.measure-actions button.on{background:#1f8a52!important;color:#fff!important;border-color:#58d891!important}
	.measure-actions button.danger{background:#7f251f!important;color:#fff!important;border-color:#c44a40!important}

/* ===== Avaliação: contraste no tema claro (fundo claro→texto escuro; card automático escuro→texto claro) ===== */
.av-table th{background:#eef2ee!important;color:#2c3a33!important;border-color:#d7ded8!important}
.av-tname{background:#eef2ee!important;color:#15663c!important}
.av-cell{background:#fff!important;color:#16201b!important;border-color:#cdd6cf!important}
.av-cell::placeholder{color:#9aa6a0!important}
.av-step{background:rgba(31,138,82,.12)!important;color:#15663c!important;border-color:#bcdcc8!important}
.av-step:active{background:rgba(31,138,82,.26)!important}
.av-addcol{background:rgba(31,138,82,.12)!important;color:#15663c!important;border-color:#bcdcc8!important}
.av-delcol{color:#b23b32!important}
.av-hint,.av-auto-note{color:#55615b!important}
.av-auto-toggle{background:#1f8a52!important;color:#f1faf3!important}
.av-auto-toggle.off{background:#eef2ee!important;color:#15663c!important;border:1px solid #bcdcc8!important}
/* Card de foco (modo automático): fundo escuro -> texto claro, alto contraste */
.av-auto-box{background:#10211a!important;border:1px solid #2f6b45!important;box-shadow:var(--vm-shadow)!important}
.av-auto-top{color:#bfe6cd!important}
.av-auto-main{color:#f2faf4!important}
.av-auto-sub{color:#aecbb7!important}
.av-auto-input{background:#fff!important;color:#0f1d16!important;border:1px solid #58d891!important}
.av-auto-count button{background:#1f7a47!important;color:#eafff2!important;border-color:#34935a!important}
.av-auto-nav button{background:#17291f!important;color:#cfeada!important;border:1px solid #2f6b45!important}

@media (max-width:700px){
  .top-bar{align-items:center!important;flex-direction:row!important;padding:5px 10px!important;gap:8px!important}
  .top-bar>div:first-child{min-width:0;flex:0 1 auto}
  .top-bar-right{justify-content:flex-start!important;overflow-x:auto!important;flex-wrap:nowrap!important;padding-bottom:1px}
  .top-bar-info{display:none!important}
  .loc-chip{max-width:50vw!important}
  .loc-chip .sub,.loc-chip .car{display:none!important}
  .toolbar-extra{left:auto!important;right:10px!important;bottom:10px!important;display:flex!important;gap:7px!important}
  .toolbar-extra button{min-width:0!important;height:auto!important;padding:0!important}
  .tool-ico{display:inline-flex!important;height:42px;min-width:46px;font-size:12px}
  .panel,.edit-panel,.se-panel{max-width:calc(100vw - 18px)!important}
  .sd-codigo{flex:1 1 100%!important;order:3;font-size:17px!important;letter-spacing:0!important}
  .sd-header .sd-back{order:1}
  .sd-actions{order:2;flex:1 1 auto;justify-content:flex-end;flex-wrap:wrap}
}
</style>

/* ============ DATE / STAGE UTILS ============ */
function pD(d){
  if(!d)return null;
  var s=String(d).trim();
  var m=s.match(/(\d{1,2})\s*\/\s*(\d{1,2})\s*\/\s*(\d{4})/);
  if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  m=s.match(/(\d{4})-(\d{2})-(\d{2})/);
  return m?new Date(+m[1],+m[2]-1,+m[3]):null;
}
function fD(d){
  if(!d)return "";
  var dd=String(d.getDate()).padStart(2,'0');
  var mm=String(d.getMonth()+1).padStart(2,'0');
  return dd+"/"+mm+"/"+d.getFullYear();
}
function fDIso(d){
  if(!d)return "";
  var dd=String(d.getDate()).padStart(2,'0');
  var mm=String(d.getMonth()+1).padStart(2,'0');
  return d.getFullYear()+"-"+mm+"-"+dd;
}
function isoToBR(iso){
  if(!iso)return "";
  var m=String(iso).match(/(\d{4})-(\d{2})-(\d{2})/);
  return m?m[3]+"/"+m[2]+"/"+m[1]:iso;
}
function brToIso(br){
  if(!br)return "";
  var m=String(br).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(!m)return "";
  return m[3]+"-"+String(m[2]).padStart(2,'0')+"-"+String(m[1]).padStart(2,'0');
}

function normalizeRZLib(arr){
  arr=Array.isArray(arr)?arr:[];
  var by={}, out=[];
  arr.forEach(function(x){
    if(!x||typeof x!=='object'||!x.key||!x.texto)return;
    if(!x.id)x.id='rz'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
    x.nome=String(x.nome||'Randomização').slice(0,80);
    x.updatedAt=parseInt(x.updatedAt)||Date.now();
    by[x.id]=x;
  });
  Object.keys(by).forEach(function(id){ out.push(by[id]); });
  out.sort(function(a,b){return (b.updatedAt||0)-(a.updatedAt||0);});
  return out.slice(0,20);
}

function save(){
  try{
    localStorage.setItem("iracema-v7",JSON.stringify(data));
    _saveErrAlerted=false;
  }catch(e){
    /* Sem espaço? Sacrifica os backups LOCAIS (a nuvem + Histórico da nuvem cobrem recuperação)
       e tenta gravar o estado ativo de novo ANTES de alertar — preservar o dado atual é prioridade. */
    var ok=false;
    try{
      var bk=JSON.parse(localStorage.getItem('iracema-safety')||'[]');
      while(!ok && bk.length){ bk.shift(); try{ localStorage.setItem('iracema-safety',JSON.stringify(bk)); }catch(e2){} try{ localStorage.setItem("iracema-v7",JSON.stringify(data)); ok=true; }catch(e3){} }
      if(!ok){ try{ localStorage.removeItem('iracema-safety'); localStorage.setItem("iracema-v7",JSON.stringify(data)); ok=true; }catch(e4){} }
    }catch(e5){}
    if(ok){ _saveErrAlerted=false; }
    else if(!_saveErrAlerted){
      _saveErrAlerted=true;
      alert("⚠ Falha ao salvar localmente.\n\n"+e.message+"\n\nSuas edições não estão sendo persistidas. Faça BACKUP agora (💾) e recarregue o app.");

/* ============ STUDY UTILS ============ */
// Compute the "next events" (applications + evaluations) for a study
function studyEvents(study){
  // study = {id,nome,dataInicio (iso), intervaloDias, numAplicacoes, avaliacoes:[iso,...]}
  var out=[];
  var start=pD(isoToBR(study.dataInicio)) || pD(study.dataInicio);
  if(start && !isNaN(start)){
    var n=Math.max(1, parseInt(study.numAplicacoes)||1);
    var iv=parseInt(study.intervaloDias)||0;
    for(var i=0;i<n;i++){
      var dt=(iv>0)?addDays(start,i*iv):new Date(start);
      out.push({type:'apl',idx:i+1,total:n,date:dt});
    }
  }
  (study.avaliacoes||[]).forEach(function(av,i){
    var iso=(av&&typeof av==='object')?av.data:av;  /* V2: avaliação é objeto {data,...}; V1: string */
    var d=pD(isoToBR(iso))||pD(iso);
    if(d && !isNaN(d))out.push({type:'eval',idx:i+1,date:d});
  });
  out.sort(function(a,b){return a.date-b.date});
  return out;
}

// Next upcoming event (including today)
function nextEvent(study){
  var t=today0();
  var evs=studyEvents(study);
  for(var i=0;i<evs.length;i++){
    if(evs[i].date >= t)return evs[i];
  }
  // if nothing upcoming, check overdue (past but within 3 days window)
  var last=evs[evs.length-1];
  if(last){
    var diff=daysBetween(last.date,t);
    if(diff<=3)return Object.assign({overdue:true,daysAgo:diff},last);
  }
  return null;
}

// All studies across all quadras, sorted by next event
function allUpcomingEvents(windowDays){
  windowDays = windowDays || 30;
  var t=today0();
  var limit=addDays(t,windowDays);
  var all=[];
  Object.keys(data).forEach(function(qid){
    var q=data[qid];
    if(!q||!Array.isArray(q.estudos))return;
    q.estudos.forEach(function(st){
      st=(typeof normalizeStudy==='function')?normalizeStudy(st):st;
      (typeof studyEventsV2==='function'?studyEventsV2(st):studyEvents(st)).forEach(function(ev){
        if(ev.realizada)return;
        var diff=daysBetween(t,ev.date);
        if(diff>=-3 && ev.date<=limit){
          all.push({qid:qid,study:st,event:ev,diff:diff});
        }
      });
    });
  });
  all.sort(function(a,b){return a.event.date-b.event.date});
  return all;
}

function quadraHasAlert(qid){
  var q=data[qid];
  if(!q||!q.estudos||!q.estudos.length)return false;
  for(var i=0;i<q.estudos.length;i++){
    var ne=nextEvent(q.estudos[i]);
    if(ne){
      var diff=daysBetween(today0(),ne.date);
      if(diff<=2)return true;
    }
  }
  return false;
}

      else { cloudSave(); } /* nuvem vazia -> semeia */

function toggleAgenda(){
  agO=!agO;
  document.getElementById("agendaPanel").classList.toggle("open",agO);
  if(agO)renderAgenda();
}
function renderAgenda(){
  var events=allUpcomingEvents(30);
  var today=today0();

  var groups={overdue:[],today:[],soon:[],week:[],month:[]};
  events.forEach(function(e){
    if(e.diff<0)groups.overdue.push(e);
    else if(e.diff===0)groups.today.push(e);
    else if(e.diff<=3)groups.soon.push(e);
    else if(e.diff<=7)groups.week.push(e);
    else groups.month.push(e);
  });

  var h='<div class="ag-title">AGENDA (30 DIAS)<button class="ag-close" onclick="toggleAgenda()">×</button></div>';

  function renderGroup(title,arr,cls){
    if(!arr.length)return "";
    var gh='<div class="ag-group"><div class="ag-group-title">'+title+' ('+arr.length+')</div>';
    arr.forEach(function(e){
      var typeLabel = e.event.type==='apl' ? ('APLICAÇÃO '+e.event.idx+'/'+e.event.total) : ('AVALIAÇÃO '+e.event.idx);
      var dateLabel = fD(e.event.date);
      if(e.diff===0)dateLabel='HOJE';
      else if(e.diff===1)dateLabel='Amanhã';
      else if(e.diff===-1)dateLabel='Ontem';
      else if(e.diff<0)dateLabel='há '+Math.abs(e.diff)+'d';
      else dateLabel='em '+e.diff+'d';
      var color = e.diff<=0?'#ff5252':(e.diff<=3?'#ffb74d':'#64b5f6');
      gh+='<div class="ag-item '+cls+'" onclick="closeAgendaAndOpen(\''+e.qid+'\')">';
      gh+='<div class="ag-item-top"><span class="ag-item-qid">'+esc(quadraNome(e.qid))+'</span><span class="ag-item-date" style="color:'+color+'">'+dateLabel+'</span></div>';
      gh+='<div class="ag-item-name">'+esc(e.study.nome)+'</div>';
      gh+='<div class="ag-item-type" style="color:'+color+'">'+typeLabel+' • '+fD(e.event.date)+'</div>';
      gh+='</div>';
    });
    gh+='</div>';
    return gh;
  }

  h+=renderGroup('⚠️ ATRASADOS',groups.overdue,'overdue');
  h+=renderGroup('🔴 HOJE',groups.today,'today');
  h+=renderGroup('🟠 PRÓXIMOS 3 DIAS',groups.soon,'soon');
  h+=renderGroup('📅 ESTA SEMANA',groups.week,'');
  h+=renderGroup('📆 PRÓXIMOS 30 DIAS',groups.month,'');

  if(!events.length)h+='<div class="ag-empty">Nenhum evento programado.<br>Adicione estudos nas quadras para visualizar aqui.</div>';

  document.getElementById("agendaPanel").innerHTML=h;
}

var NDVI_PROXY=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://localhost:8799':'https://ndvi-iracemapolis.onrender.com';
var ndviIndex=null, ndviDate=null, ndviOverlay=null, ndviOpacity=0.78, ndviClip=true, ndviMeans=null;

function pointInRing(x,y,ring){ var inside=false,i,j;
  for(i=0,j=ring.length-1;i<ring.length;j=i++){ var xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    if(((yi>y)!=(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside; } return inside; }

   superamostragem p/ suavizar; teto = máx da Process API (2500). Evita subamostrar áreas grandes. */

  try{
    var w=bb[0], s=bb[1], e=bb[2], n=bb[3], midLat=(s+n)/2;
    var mWidth=Math.abs(e-w)*111320*Math.cos(midLat*Math.PI/180);
    var px=Math.round(mWidth/10*1.6);
    return Math.max(1024, Math.min(2500, px||1024));
  }catch(_e){ return 1024; }
}
function computeQuadraMeans(){
  var bb=ndviBBox(), w=bb[0], s=bb[1], e=bb[2], n=bb[3];

   .then(function(r){ return r.ok?r.blob():null; })
   .then(function(blob){ if(!blob) return;
     var bu=URL.createObjectURL(blob), img=new Image();

       try{

         var data=ctx.getImageData(0,0,iw,ih).data, means={};
         quadrasAtivas().forEach(function(id){
           var pp=QGEO[id]; if(!pp||pp.length<3) return;
           var ring=pp.map(function(p){ return [ (p[1]-w)/(e-w)*iw, (n-p[0])/(n-s)*ih ]; });
           var minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
           ring.forEach(function(q){ minx=Math.min(minx,q[0]); maxx=Math.max(maxx,q[0]); miny=Math.min(miny,q[1]); maxy=Math.max(maxy,q[1]); });
           minx=Math.max(0,Math.floor(minx)); maxx=Math.min(iw-1,Math.ceil(maxx));

/* Nascer/pôr do sol + horas de luz — cálculo OFFLINE (equação do nascer do sol, NOAA).
   date local; lat/lng em graus. Retorna {sunrise:Date, sunset:Date, dayMs} (UTC) ou {polar}. */
function sunriseSunset(date, lat, lng){
  var rad=Math.PI/180;
  var Jdate=Date.UTC(date.getFullYear(),date.getMonth(),date.getDate())/86400000 + 2440587.5;
  var n=Math.ceil(Jdate - 2451545.0 + 0.0008);
  var Jstar=n - (lng/360.0);
  var M=(357.5291 + 0.98560028*Jstar) % 360, Mr=M*rad;
  var C=1.9148*Math.sin(Mr) + 0.0200*Math.sin(2*Mr) + 0.0003*Math.sin(3*Mr);
  var lambda=(M + C + 282.9372) % 360, lr=lambda*rad;
  var Jtransit=2451545.0 + Jstar + 0.0053*Math.sin(Mr) - 0.0069*Math.sin(2*lr);
  var delta=Math.asin(Math.sin(lr)*Math.sin(23.4397*rad));
  var cosH=(Math.sin(-0.833*rad) - Math.sin(lat*rad)*Math.sin(delta)) / (Math.cos(lat*rad)*Math.cos(delta));
  if(cosH>=1) return {polar:'night'};
  if(cosH<=-1) return {polar:'day'};
  var H=Math.acos(cosH)/rad;
  function jd2date(jd){ return new Date((jd - 2440587.5)*86400000); }
  var sr=jd2date(Jtransit - H/360.0), ss=jd2date(Jtransit + H/360.0);
  return { sunrise:sr, sunset:ss, dayMs:(ss-sr) };
}
/* Coordenada p/ o sol da estação selecionada: prefere o CENTRO do Local georreferenciado
   que casa com a estação (confiável); senão a coord cadastrada da estação. */
function _climaSunLL(){
  var st=(_climaStations||[]).filter(function(s){return s.mac===climaMac;})[0]; if(!st) return null;
  if(typeof LOCAIS==='object' && LOCAIS){
    var sn=_climaNorm(st.name||''), ids=Object.keys(LOCAIS), i, k;
    for(i=0;i<ids.length;i++){ var c=LOCAIS[ids[i]].centro, ln=_climaNorm(LOCAIS[ids[i]].nome||'');
      if(c&&c.length===2&&ln&&(sn.indexOf(ln)>=0||ln.indexOf(sn)>=0)) return c; }
    var toks=sn.match(/[a-z]{4,}/g)||[];
    for(i=0;i<ids.length;i++){ var c2=LOCAIS[ids[i]].centro, ln2=_climaNorm(LOCAIS[ids[i]].nome||'');
      if(c2&&c2.length===2){ for(k=0;k<toks.length;k++){ if(ln2.indexOf(toks[k])>=0) return c2; } } }
  }
  if(st.lat!=null&&st.lng!=null) return [st.lat, st.lng];
  return null;
}

    }
  }
  var ts=d.time?new Date(d.time*1000):null;
  h+='<div class="clima-foot">'+(ts?('atualizado '+ts.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})):'')+' · auto 5 min '+ic('refresh',11)+'</div>';
  b.innerHTML=h;
}

var _ndviObjURL=null;
function ndviLoadImage(){
  if(!ndviIndex || !ndviDate) return;
  var bb=ndviBBox(), w=bb[0], s=bb[1], e=bb[2], n=bb[3];
  ndviStatus('Carregando '+ndviIndex+' de '+ndviDate+'…');
  fetch(NDVI_PROXY+'/index?index='+ndviIndex+'&date='+ndviDate+'&bbox='+bb.join(',')+'&width='+ndviPx(bb))
   .then(function(r){ if(r.ok) return r.blob(); return r.json().then(function(j){ throw (j.error||'erro'); }); })
   .then(function(blob){
     var bu=URL.createObjectURL(blob), img=new Image();
     img.onload=function(){
       var iw=img.naturalWidth||1024, ih=img.naturalHeight||1024, url=bu;
       var isTC=(ndviIndex==='TRUECOLOR');
       if(ndviClip && !isTC){
         try{
           var cv=document.createElement('canvas'); cv.width=iw; cv.height=ih;
           var ctx=cv.getContext('2d'); ctx.beginPath();
           quadrasAtivas().forEach(function(id){
             var pp=QGEO[id]; if(!pp||pp.length<3) return;
             pp.forEach(function(p,i){ var px=(p[1]-w)/(e-w)*iw, py=(n-p[0])/(n-s)*ih; if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py); });

       if(_ndviObjURL){ try{ URL.revokeObjectURL(_ndviObjURL); }catch(er){} _ndviObjURL=null; } /* libera o blob do overlay anterior */
       ndviOverlay=LF.imageOverlay(url,[[s,w],[n,e]],{opacity:ndviOpacity}).addTo(_map);
       ndviOverlay.bringToFront();
       if(url===bu){ _ndviObjURL=bu; } else { try{ URL.revokeObjectURL(bu); }catch(er){} } /* recortou (dataURL) -> o blob não é mais usado */
       if(isTC){ ndviStatus('Cor real (Sentinel-2) • '+ndviDate,'ok'); ndviMeans=null; renderNdviRank(); }

   }).catch(function(e){ ndviStatus('Sem imagem nessa data: '+e,'err'); });

/* Série temporal por quadra (Statistical API) */
function ndviSerie(id){
  if(!_map) initMap(); ensureQGEO();

  var ring=pts.map(function(p){return [p[1],p[0]];}); ring.push(ring[0]);

  var to=todayISO(); var dt=new Date(); dt.setFullYear(dt.getFullYear()-1);
  var from=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  var ix=ndviIndex||'NDVI';

   .then(function(r){return r.json();}).then(function(arr){
     if(arr.error){ showSerieModal(id, ix, null, arr.error); return; }
     showSerieModal(id, ix, arr);
   }).catch(function(){ showSerieModal(id, ix, null, 'Proxy desligado? Rode: python3 ndvi-proxy.py'); });

function showSerieModal(id, ix, arr, err){
  var m=document.getElementById('ndviModal');
  if(!m){ m=document.createElement('div'); m.id='ndviModal'; m.className='ndvi-modal'; m.onclick=function(e){ if(e.target===m) m.style.display='none'; }; document.body.appendChild(m); }
  var inner='<div class="ndvi-modal-box"><div class="ndvi-modal-top"><b>'+esc(ix)+' — quadra '+esc(id)+'</b><button onclick="document.getElementById(\'ndviModal\').style.display=\'none\'">✕</button></div>';
  if(err){ inner+='<div class="ndvi-status" style="color:#ff8a80">'+esc(String(err))+'</div>'; }
  else if(arr==='carregando'){ inner+='<div class="ndvi-status">Calculando série dos últimos 12 meses…</div>'; }
  else if(!arr.length){ inner+='<div class="ndvi-status">Sem dados no período (muita nuvem?).</div>'; }
  else { inner+=serieSvg(arr); var last=arr[arr.length-1];
    inner+='<div class="ndvi-status">Último: <b style="color:#9ac49a">'+last.mean.toFixed(2)+'</b> em '+last.date+' • '+arr.length+' datas</div>'; }
  inner+='</div>';
  m.innerHTML=inner; m.style.display='flex';
}
function serieSvg(arr){
  var W=520,H=180,pad=30;
  var means=arr.map(function(d){return d.mean;});
  var mn=Math.min.apply(null,means), mx=Math.max.apply(null,means); if(mx-mn<0.05){mx+=0.03;mn-=0.03;}
  function X(i){ return pad + (W-2*pad)*(arr.length<2?0.5:i/(arr.length-1)); }
  function Y(v){ return H-pad - (H-2*pad)*(v-mn)/(mx-mn); }
  var path=arr.map(function(d,i){return (i?'L':'M')+X(i).toFixed(1)+' '+Y(d.mean).toFixed(1);}).join(' ');
  var dots=arr.map(function(d,i){return '<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(d.mean).toFixed(1)+'" r="2.5" fill="#9ac49a"/>';}).join('');
  var lbls='<text x="4" y="14" fill="#789" font-size="10">'+mx.toFixed(2)+'</text><text x="4" y="'+(H-pad+4)+'" fill="#789" font-size="10">'+mn.toFixed(2)+'</text>';
  var dlab='<text x="'+pad+'" y="'+(H-8)+'" fill="#789" font-size="9">'+arr[0].date+'</text><text x="'+(W-pad)+'" y="'+(H-8)+'" fill="#789" font-size="9" text-anchor="end">'+arr[arr.length-1].date+'</text>';
  return '<svg width="100%" viewBox="0 0 '+W+' '+H+'" class="ndvi-svg"><rect width="'+W+'" height="'+H+'" fill="#0a110a"/><path d="'+path+'" fill="none" stroke="#5a8a5a" stroke-width="2"/>'+dots+lbls+dlab+'</svg>';
}

/* Área (hectares) e centro (lat,lng) calculados do polígono da quadra */
function quadraAreaHa(id){
  ensureQGEO();
  var pts=QGEO&&QGEO[id]; if(!pts||pts.length<3) return null;
  var lat0=0; pts.forEach(function(p){lat0+=p[0];}); lat0/=pts.length;
  var mLat=110540, mLng=111320*Math.cos(lat0*Math.PI/180), a=0;
  for(var i=0;i<pts.length;i++){ var j=(i+1)%pts.length;
    a += (pts[i][1]*mLng)*(pts[j][0]*mLat) - (pts[j][1]*mLng)*(pts[i][0]*mLat); }
  return Math.abs(a)/2/10000;
}
function quadraCenter(id){
  ensureQGEO();
  var pts=QGEO&&QGEO[id]; if(!pts||!pts.length) return null;
  var sLat=0,sLng=0; pts.forEach(function(p){sLat+=p[0];sLng+=p[1];});
  return [sLat/pts.length, sLng/pts.length];
}
/* Comprimento × largura reais (m) da quadra: retângulo de MENOR ÁREA que a encaixa
   (rotating-calipers sobre o fecho convexo). Independe da orientação em relação ao norte —
   mede ao longo dos eixos da própria quadra, então serve pra planejar parcelas. */
function quadraDims(id){
  ensureQGEO();
  var pts=QGEO&&QGEO[id]; if(!pts||pts.length<3) return null;
  var la0=0,lo0=0; pts.forEach(function(p){la0+=p[0];lo0+=p[1];}); la0/=pts.length; lo0/=pts.length;
  var k=Math.cos(la0*Math.PI/180);
  var m=pts.map(function(p){ return {x:(p[1]-lo0)*111320*k, y:(p[0]-la0)*110540}; });
  var P=m.slice().sort(function(a,b){ return a.x-b.x || a.y-b.y; });
  function cross(o,a,b){ return (a.x-o.x)*(b.y-o.y)-(a.y-o.y)*(b.x-o.x); }
  var lo=[],up=[],i;
  for(i=0;i<P.length;i++){ while(lo.length>=2 && cross(lo[lo.length-2],lo[lo.length-1],P[i])<=0) lo.pop(); lo.push(P[i]); }
  for(i=P.length-1;i>=0;i--){ while(up.length>=2 && cross(up[up.length-2],up[up.length-1],P[i])<=0) up.pop(); up.push(P[i]); }
  lo.pop(); up.pop(); var H=lo.concat(up); if(H.length<3) H=m;
  var best=null;
  for(i=0;i<H.length;i++){
    var a=H[i], b=H[(i+1)%H.length], ex=b.x-a.x, ey=b.y-a.y, len=Math.sqrt(ex*ex+ey*ey);
    if(len<1e-9) continue;
    var ux=ex/len, uy=ey/len, minu=1e18,maxu=-1e18,minv=1e18,maxv=-1e18;
    for(var j=0;j<H.length;j++){ var du=H[j].x*ux+H[j].y*uy, dv=-H[j].x*uy+H[j].y*ux;
      if(du<minu)minu=du; if(du>maxu)maxu=du; if(dv<minv)minv=dv; if(dv>maxv)maxv=dv; }
    var w=maxu-minu, hgt=maxv-minv, area=w*hgt;
    if(!best || area<best.area) best={area:area, a:w, b:hgt};
  }
  if(!best) return null;
  return { comprimento:Math.max(best.a,best.b), largura:Math.min(best.a,best.b) };
}

    s.tratamentos.forEach(function(t){ L.push((t.id||'')+'\t'+(t.produto||'')+'\t'+(t.dose||'')+'\t'+(t.volume||'')+'\t'+(t.obs||'')); }); }
  if(s.aplicacoes.length){ L.push(''); L.push('APLICACOES'); L.push('Data\tBBCH\tObs');

        L.push((isoToBR(a.data)||'')+'\t'+v+'\t'+t.id+'\t'+(mv!=null?_r1(mv):'')+'\t'+ctrl); }); }); });
    var _bv={}; _avsR.forEach(function(a){ if(!a.data)return; var m=_avMeans(s,a); (a.variaveis||[]).forEach(function(v){ (_bv[v]=_bv[v]||[]).push({date:a.data,m:m}); }); });

function renderStudyCard(qid,study){
  var ne=nextEvent(study);
  var cls='';
  var nextHtml='';
  if(ne){
    var t=today0();
    var diff=daysBetween(t,ne.date);
    var label='';
    var chipCls='next-apl';
    if(ne.type==='eval')chipCls='next-eval';
    if(diff===0){label='HOJE';chipCls='next-today';cls='next-alert'}
    else if(diff<0){label='Atrasado há '+Math.abs(diff)+' dia(s)';chipCls='next-overdue';cls='next-alert'}
    else if(diff<=2){label='em '+diff+' dia'+(diff>1?'s':'');cls='next-soon'}
    else label='em '+diff+' dias';
    var typeName = ne.type==='apl' ? ('Aplicação '+ne.idx+'/'+ne.total) : ('Avaliação '+ne.idx);
    nextHtml='<div class="study-next '+chipCls+'"><span>'+typeName+' • '+fD(ne.date)+'</span><span style="font-weight:700">'+label+'</span></div>';
  }

  // Timeline of all events
  var evs=studyEvents(study);
  var tlHtml='';
  if(evs.length){
    tlHtml='<div class="study-timeline">';
    var t=today0();
    evs.forEach(function(ev){
      var diff=daysBetween(t,ev.date);
      var c='';
      if(diff<0)c='done';
      else if(diff===0)c='today';
      else if(diff<=2)c='soon';
      var lbl = ev.type==='apl' ? ('A'+ev.idx) : ('V'+ev.idx);
      var dateLbl = fD(ev.date).slice(0,5);
      tlHtml+='<span class="tl-item '+c+'" title="'+fD(ev.date)+'">'+lbl+' '+dateLbl+'</span>';
    });
    tlHtml+='</div>';
  }

  var nApl=Math.max(1,parseInt(study.numAplicacoes)||1);
  var intInfo = study.intervaloDias>0 ? (study.intervaloDias+' dias entre aplicações') : 'Aplicação única';
  var nAval=(study.avaliacoes||[]).length;

  var html='<div class="study-card '+cls+'">';
  html+='<div class="study-top"><div class="study-name">'+esc(study.nome||'(sem nome)')+'</div>';
  html+='<div class="study-actions"><button class="study-btn" onclick="studyExport(\''+qid+'\',\''+study.id+'\')" title="Copiar dados do ensaio + NDVI do período p/ planilha">📄</button><button class="study-btn" onclick="openStudyEdit(\''+qid+'\',\''+study.id+'\')" title="Editar">✎</button><button class="study-btn del" onclick="deleteStudy(\''+qid+'\',\''+study.id+'\')" title="Excluir">×</button></div></div>';
  html+='<div class="study-meta"><b>Início:</b> '+(study.dataInicio?fD(pD(isoToBR(study.dataInicio))):'—')+' • <b>'+nApl+'</b> aplicação(ões) • '+intInfo+' • <b>'+nAval+'</b> avaliação(ões)</div>';
  html+=nextHtml;
  html+=tlHtml;
  html+='</div>';
  return html;
}

function getCulturas(d){
  if(!d) return [];
  if(Array.isArray(d.culturas) && d.culturas.length) return d.culturas.filter(function(c){return c&&c.cultura;});
  if(d.cultura) return [{cultura:d.cultura, cultivar:d.cultivar||'', plantio:d.plantio||''}];

function closeEdit(){document.getElementById("eOvl").classList.remove("open");curE=null}
function saveE(){
  if(!curE)return;
  /* Renomear (atualiza só o nome de exibição; o id interno não muda) */
  var novoNome=((document.getElementById('eqnome')||{}).value||'').trim();
  if(novoNome && novoNome!==quadraNome(curE)){
    ensureLocais();
    var loc=QLOCAL[curE]||HOME_LOCAL;
    var dup=quadrasDoLocal(loc).some(function(q){ return q!==curE && quadraNome(q).toLowerCase()===novoNome.toLowerCase(); });
    if(dup){ alert('Já existe uma quadra chamada "'+novoNome+'" neste local.'); return; }
    QNOME[curE]=novoNome; saveQNome();
  }
  /* Mover para outro local */
  var novoLoc=((document.getElementById('eqloc')||{}).value)||'';
  if(novoLoc && LOCAIS[novoLoc] && novoLoc!==(QLOCAL[curE]||HOME_LOCAL)){
    var nm=quadraNome(curE);
    var dupDest=quadrasDoLocal(novoLoc).some(function(q){ return q!==curE && quadraNome(q).toLowerCase()===nm.toLowerCase(); });
    if(dupDest){ alert('No local de destino já existe uma quadra "'+nm+'". Renomeie antes de mover.'); return; }
    QLOCAL[curE]=novoLoc; saveQLocal();
  }
  ecReadRows();
  var culturas=_ecRows.filter(function(c){return c.cultura;}).map(function(c){return {cultura:c.cultura,cultivar:(c.cultivar||'').trim(),plantio:(c.plantio||'').trim()};});
  var estudos = (data[curE]&&data[curE].estudos)||[];
  var prim = culturas[0]||{cultura:'',cultivar:'',plantio:''};
  data[curE]={
    cultura:prim.cultura, cultivar:prim.cultivar, plantio:prim.plantio,
    culturas:culturas,
    area:parseFloat(document.getElementById("ea").value)||null,
    estudos:estudos
  };
  save();closeEdit();render();renderLeg();updateAgendaBadge();
  if(curV)showD(curV);
}

function openStudyEdit(qid,sid){
  curS=qid;curSid=sid;
  closeDetail();
  var study = null;
  if(sid){
    var arr = (data[qid]||{}).estudos||[];
    study = arr.find(function(s){return s.id===sid});
  }
  if(!study){
    study={
      id:uid(),
      nome:'',
      dataInicio:fDIso(today0()),
      intervaloDias:14,
      numAplicacoes:1,
      avaliacoes:[]
    };
  }

  var avalHtml = '<div class="eval-dates" id="evalList">';
  (study.avaliacoes||[]).forEach(function(iso,i){
    avalHtml+='<div class="eval-chip"><span>'+fD(pD(isoToBR(iso)))+'</span><button class="eval-chip-rm" onclick="removeAval('+i+')">×</button></div>';
  });
  avalHtml+='</div>';

  var isNew = !sid;
  var h='<div class="edit-title">'+(isNew?'NOVO ESTUDO':'EDITAR ESTUDO')+'</div>';
  h+='<div class="edit-id">'+esc(quadraNome(qid))+'</div>';
  h+='<div class="edit-subtitle" style="color:#8a8">'+esc((data[qid]||{}).cultura||'')+' • '+esc((data[qid]||{}).cultivar||'')+'</div>';

  h+='<label class="e-lbl">NOME DO ESTUDO</label>';
  h+='<input id="s_nome" class="e-inp" value="'+esc(study.nome||'')+'" placeholder="Ex: Fungicida X vs. ferrugem asiática">';

  h+='<label class="e-lbl">DATA DA 1ª APLICAÇÃO</label>';
  h+='<input id="s_dataInicio" class="e-inp" type="date" value="'+esc(study.dataInicio||'')+'">';

  h+='<div class="e-row">';
  h+='<div><label class="e-lbl">Nº DE APLICAÇÕES</label>';
  h+='<input id="s_numApl" class="e-inp" type="number" min="1" value="'+(study.numAplicacoes||1)+'"></div>';
  h+='<div><label class="e-lbl">INTERVALO (DIAS)</label>';
  h+='<input id="s_intervalo" class="e-inp" type="number" min="0" value="'+(study.intervaloDias||0)+'" placeholder="Ex: 14"></div>';
  h+='</div>';
  h+='<div class="e-hint">Se houver mais de 1 aplicação, as próximas serão calculadas automaticamente.</div>';

  h+='<label class="e-lbl">DATAS DE AVALIAÇÃO</label>';
  h+=avalHtml;
  h+='<div class="eval-add-row"><input id="s_newAval" class="e-inp" type="date"><button class="eval-add-btn" onclick="addAval()">+</button></div>';
  h+='<div class="e-hint">Adicione uma ou mais datas de avaliação de campo.</div>';

  h+='<div class="e-btns"><button class="e-btn e-save" onclick="saveStudy()">SALVAR</button><button class="e-btn e-cancel" onclick="closeStudyEdit()">CANCELAR</button></div>';
  if(!isNew){
    h+='<button class="e-btn-del" onclick="deleteStudy(\''+qid+'\',\''+sid+'\',true)">EXCLUIR ESTUDO</button>';
  }

  document.getElementById("sPnl").innerHTML=h;
  document.getElementById("sOvl").classList.add("open");

  // store working copy
  document.getElementById("sPnl").dataset.study=JSON.stringify(study);
}

function closeStudyEdit(){
  document.getElementById("sOvl").classList.remove("open");
  var qid=curS;curS=null;curSid=null;
  if(qid)showD(qid);
}

function getWorkingStudy(){
  try{return JSON.parse(document.getElementById("sPnl").dataset.study||'{}')}catch(e){return{}}
}
function setWorkingStudy(s){
  document.getElementById("sPnl").dataset.study=JSON.stringify(s);
}

function addAval(){
  var v=document.getElementById("s_newAval").value;
  if(!v)return;
  var s=getWorkingStudy();
  if(!Array.isArray(s.avaliacoes))s.avaliacoes=[];
  if(s.avaliacoes.indexOf(v)===-1){
    s.avaliacoes.push(v);
    s.avaliacoes.sort();
  }
  setWorkingStudy(s);
  // re-render the eval list
  var ul=document.getElementById("evalList");
  var hh='';
  s.avaliacoes.forEach(function(iso,i){
    hh+='<div class="eval-chip"><span>'+fD(pD(isoToBR(iso)))+'</span><button class="eval-chip-rm" onclick="removeAval('+i+')">×</button></div>';
  });
  ul.innerHTML=hh;
  document.getElementById("s_newAval").value='';
}
function removeAval(i){
  var s=getWorkingStudy();
  if(!Array.isArray(s.avaliacoes))return;
  s.avaliacoes.splice(i,1);
  setWorkingStudy(s);
  var ul=document.getElementById("evalList");
  var hh='';
  s.avaliacoes.forEach(function(iso,j){
    hh+='<div class="eval-chip"><span>'+fD(pD(isoToBR(iso)))+'</span><button class="eval-chip-rm" onclick="removeAval('+j+')">×</button></div>';
  });
  ul.innerHTML=hh;
}

function saveStudy(){
  if(!curS)return;
  var s=getWorkingStudy();
  s.nome=document.getElementById("s_nome").value.trim();
  s.dataInicio=document.getElementById("s_dataInicio").value;
  s.numAplicacoes=parseInt(document.getElementById("s_numApl").value)||1;
  s.intervaloDias=parseInt(document.getElementById("s_intervalo").value)||0;
  if(!s.nome){alert("Dê um nome ao estudo.");return}
  if(!s.dataInicio){alert("Informe a data da 1ª aplicação.");return}
  if(!s.id)s.id=uid();

  var q = data[curS]||{};
  if(!Array.isArray(q.estudos))q.estudos=[];
  var idx = q.estudos.findIndex(function(x){return x.id===s.id});
  if(idx>=0)q.estudos[idx]=s; else q.estudos.push(s);
  data[curS]=q;
  save();
  var qid=curS;
  closeStudyEdit();
  render();updateAgendaBadge();
  showD(qid);
}

function deleteStudy(qid,sid,skipConfirm){
  requireDeletePassword('Excluir este estudo e seus resultados.', function(){
    safetyBackup('antes de excluir estudo');
    var q=data[qid];if(!q||!q.estudos)return;
    _markDeleted(q,'_deletedStudies',sid);
    q.estudos=q.estudos.filter(function(s){return s.id!==sid});
    save();
    if(document.getElementById("sOvl").classList.contains("open")){
      closeStudyEdit();
    }
    render();updateAgendaBadge();
    showD(qid);
  });
}

function normalizeStudy(s){
  /* Garante que todos os campos existem mesmo em estudos antigos */
  if(!s)return newStudy();
  if(!s.id)s.id=uid();
  if(typeof s.codigo!=="string")s.codigo=s.nome||"";
  if(typeof s.descricao!=="string")s.descricao="";
  if(typeof s.dataInicio!=="string")s.dataInicio="";
  if(typeof s.intervaloDias!=="number")s.intervaloDias=parseInt(s.intervaloDias)||14;
  if(typeof s.numAplicacoes!=="number")s.numAplicacoes=parseInt(s.numAplicacoes)||1;
  if(!Array.isArray(s.tratamentos))s.tratamentos=[];
  if(typeof s.numRepeticoes!=="number")s.numRepeticoes=parseInt(s.numRepeticoes)||4;
  if(typeof s.testemunha!=="string")s.testemunha="";
  if(typeof s.avalInicio!=="string")s.avalInicio="";
  if(typeof s.avalIntervalo!=="number")s.avalIntervalo=parseInt(s.avalIntervalo)||7;
  if(typeof s.avalNum!=="number")s.avalNum=parseInt(s.avalNum)||0;
  s.randomizado=!!s.randomizado;
  if(!s.randomizacao||typeof s.randomizacao!=="object")s.randomizacao=null;
  if(!Array.isArray(s.aplicacoes))s.aplicacoes=[];
  /* Converte avaliacoes antigas (array de strings ISO) para novo formato */
  if(Array.isArray(s.avaliacoes)){
    s.avaliacoes=s.avaliacoes.map(function(a){
      if(typeof a==="string")return {id:uid(),data:a,tipo:"",bbch:"",obs:""};
      if(!a.id)a.id=uid();
      if(!a.tipo)a.tipo="";
      if(!a.bbch)a.bbch="";
      if(!a.obs)a.obs="";
      if(!Array.isArray(a.variaveis))a.variaveis=[];
      if(!a.notas||typeof a.notas!=="object")a.notas={};
      if(!a.tipos||typeof a.tipos!=="object")a.tipos={};
      if(!a.notasMeta||typeof a.notasMeta!=="object")a.notasMeta={};
      return a;
    });
  }else s.avaliacoes=[];
  return s;
}

function _repLetter(rep){
  rep=Math.max(1,parseInt(rep)||1);
  var s='', n=rep;
  while(n>0){ n--; s=REP_LETTERS[n%26]+s; n=Math.floor(n/26); }
  return s||'A';
}
function _repDisplay(rep){ return _repLetter(rep).toLowerCase(); }
function _repIndex(label){
  var s=String(label||'').toUpperCase(), n=0;
  for(var i=0;i<s.length;i++){ var p=REP_LETTERS.indexOf(s[i]); if(p<0)return 0; n=n*26+p+1; }
  return n;
}
function _parseCampoCode(tok){
  var m=String(tok||'').trim().toUpperCase().match(/^(\d+)\s*([A-Z]+)$/);
  return m?{tratNum:parseInt(m[1]),rep:_repIndex(m[2]),repLabel:m[2]}:null;
}
function _campoCode(tratNum,rep){ return String(tratNum)+_repLetter(rep); }
function _studyProtocolKey(s){
  s=normalizeStudy(s);
  return (s.tratamentos||[]).map(function(t){return t.id;}).join(',')+'|rep='+Math.max(1,parseInt(s.numRepeticoes)||1);
}
function _randomizacaoValida(ordem,nTrat,reps){
  if(!ordem||ordem.length!==nTrat*reps)return false;
  for(var r=1;r<=reps;r++){
    var seen={};
    ordem.forEach(function(p){ if(parseInt(p.rep)===r) seen[p.tratNum||0]=(seen[p.tratNum||0]||0)+1; });
    for(var t=1;t<=nTrat;t++){ if(seen[t]!==1)return false; }
  }
  return true;
}
function _modeloRandomizacao(s,ids,reps){
  var tokens=RANDOMIZACAO_MODELOS[ids.length];
  if(!tokens)return null;
  var ordem=[], parcela=1, ok=true;
  tokens.forEach(function(tok){
    if(!ok)return;
    var p=_parseCampoCode(tok);
    if(!p||p.tratNum<1||p.tratNum>ids.length){ ok=false; return; }
    if(p.rep<=reps){
      ordem.push({parcela:parcela++,tratId:ids[p.tratNum-1],tratNum:p.tratNum,rep:p.rep,repLabel:_repLetter(p.rep),campo:_campoCode(p.tratNum,p.rep)});
    }
  });
  if(!ok||!_randomizacaoValida(ordem,ids.length,reps))return null;
  return {key:_studyProtocolKey(s),ordem:ordem,geradaEm:todayISO(),modelo:'planilha',nome:'T'+ids.length,reps:'A-'+_repLetter(reps)};
}
function _studyRandomModeloInfo(st){
  st=normalizeStudy(st||{});
  var n=(st.tratamentos||[]).length, reps=Math.max(1,parseInt(st.numRepeticoes)||1);
  return {n:n,reps:reps,ok:!!RANDOMIZACAO_MODELOS[n]&&reps<=4,nome:'T'+n,repsNome:'A-'+_repLetter(Math.min(reps,4))};
}
function _hashSeed(str){
  var h=2166136261>>>0;
  for(var i=0;i<String(str).length;i++){ h^=String(str).charCodeAt(i); h=Math.imul(h,16777619)>>>0; }
  return h||123456789;
}
function _seedRand(seed){
  var x=seed>>>0;
  return function(){ x^=x<<13; x^=x>>>17; x^=x<<5; return ((x>>>0)/4294967296); };
}
function _shuffleCopy(arr,seed){
  var a=arr.slice(), rnd=_seedRand(seed);
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(rnd()*(i+1)), t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}
function buildRandomizacao(s){
  s=normalizeStudy(s);
  var ids=(s.tratamentos||[]).map(function(t){return t.id;});
  var reps=Math.max(1,parseInt(s.numRepeticoes)||1), ordem=[], parcela=1;
  var modelo=_modeloRandomizacao(s,ids,reps);
  if(modelo) return modelo;
  var base=_hashSeed((s.id||'estudo')+'|'+_studyProtocolKey(s));
  for(var r=1;r<=reps;r++){
    _shuffleCopy(ids,base+r*9973).forEach(function(tid){
      var tratNum=ids.indexOf(tid)+1;
      ordem.push({parcela:parcela++,tratId:tid,tratNum:tratNum,rep:r,repLabel:_repLetter(r),campo:_campoCode(tratNum,r)});
    });
  }
  return {key:_studyProtocolKey(s),ordem:ordem,geradaEm:todayISO(),modelo:'gerada'};
}
function ensureStudyRandomizacao(s){
  s=normalizeStudy(s);

function parseRandomizacaoText(s,text){

    var campoOrdem=[], campoSeen={}, campoParcela=1;

      if(!cp||cp.tratNum<1||cp.tratNum>ids.length) return {ok:false,msg:'Parcela não reconhecida: '+campoTokens[c]+'. Use tratamento 1 a '+ids.length+' com repetição A, B, C...'};
      if(cp.rep<1||cp.rep>reps) return {ok:false,msg:'A repetição '+cp.repLabel+' não existe neste protocolo. Ajuste o Nº de repetições ou remova essa repetição.'};
      var ckey=cp.tratNum+'|'+cp.rep;
      if(campoSeen[ckey]) return {ok:false,msg:'Parcela repetida: '+_campoCode(cp.tratNum,cp.rep)+'.'};
      campoSeen[ckey]=1;
      campoOrdem.push({parcela:campoParcela++,tratId:ids[cp.tratNum-1],tratNum:cp.tratNum,rep:cp.rep,repLabel:_repLetter(cp.rep),campo:_campoCode(cp.tratNum,cp.rep)});
    }
    if(!_randomizacaoValida(campoOrdem,ids.length,reps)) return {ok:false,msg:'A ordem precisa conter cada tratamento exatamente uma vez em cada repetição.'};

  }

  var byLine=lines.map(function(l){ return (l.match(/[A-Za-z]*\d+/g)||[]).map(function(tok){
    tok=tok.toUpperCase(); if(/^T\d+$/.test(tok)) return tok; if(/^\d+$/.test(tok)) return 'T'+tok; return tok;
  }); });
  var ordem=[], parcela=1, i,j;
  function checkRep(tokens,rep){
    if(tokens.length!==ids.length) return 'A repetição '+rep+' tem '+tokens.length+' tratamentos; esperado '+ids.length+'.';

    for(var k=0;k<tokens.length;k++){
      var tid=idSet[tokens[k]];

      if(seen[tid]) return 'Tratamento repetido na repetição '+rep+': '+tid+'.';
      seen[tid]=1; out.push(tid);
    }
    for(var m=0;m<ids.length;m++){ if(!seen[ids[m]]) return 'Faltou '+ids[m]+' na repetição '+rep+'.'; }
    return out;
  }
  if(byLine.length===reps && byLine.every(function(a){return a.length>0;})){
    for(i=0;i<reps;i++){
      var lineOk=checkRep(byLine[i],i+1); if(typeof lineOk==='string') return {ok:false,msg:lineOk};
      lineOk.forEach(function(tid){ var tn=ids.indexOf(tid)+1; ordem.push({parcela:parcela++,tratId:tid,tratNum:tn,rep:i+1,repLabel:_repLetter(i+1),campo:_campoCode(tn,i+1)}); });
    }
  }else{
    var flat=[]; byLine.forEach(function(a){ flat=flat.concat(a); });

      for(j=0;j<ok.length;j++){ var tn2=ids.indexOf(ok[j])+1; ordem.push({parcela:parcela++,tratId:ok[j],tratNum:tn2,rep:i+1,repLabel:_repLetter(i+1),campo:_campoCode(tn2,i+1)}); }

}

/* ============ EVENTOS DE UM ESTUDO (para agenda e timeline) ============ */
function studyEventsV2(study){
  var out=[];
  /* Aplicações programadas (baseado em dataInicio + intervalo) */
  var start=pD(isoToBR(study.dataInicio))||pD(study.dataInicio);
  if(start&&!isNaN(start)){
    var n=Math.max(1,parseInt(study.numAplicacoes)||1);
    var iv=parseInt(study.intervaloDias)||0;
    for(var i=0;i<n;i++){
      var dt=(iv>0)?addDays(start,i*iv):new Date(start);
      /* Verifica se já foi realizada */
      var realizada=(study.aplicacoes||[]).find(function(a){
        var ad=pD(isoToBR(a.data))||pD(a.data);
        return ad&&Math.abs(daysBetween(dt,ad))<=2;
      });
      out.push({
        type:'apl',
        idx:i+1,
        total:n,
        date:dt,
        realizada:!!realizada
      });
    }
  }
  /* Avaliações programadas (as que ainda não foram feitas) */
  (study.avaliacoes||[]).forEach(function(a,i){
    var d=pD(isoToBR(a.data))||pD(a.data);
    if(d&&!isNaN(d)){
      out.push({
        type:'eval',
        idx:i+1,
        date:d,
        tipo:a.tipo||"",
        realizada:!!a.realizada
      });
    }
  });
  return out.sort(function(a,b){return a.date-b.date});
}

function nextEventV2(study){
  var evs=studyEventsV2(study);
  var now=today0();
  for(var i=0;i<evs.length;i++){
    var diff=daysBetween(now,evs[i].date);
    if(diff>=-1&&!evs[i].realizada){
      return {ev:evs[i],diff:diff};
    }
  }
  return null;
}

/* Gera datas de avaliação a partir do protocolo (1ª data + a cada X dias + N vezes).
   Aditivo por data; reprograma só os placeholders auto AINDA vazios (não apaga avaliação com dados). */
function gerarAvaliacoesAuto(s){
  if(!s) return 0;
  var start=s.avalInicio||s.dataInicio, iv=parseInt(s.avalIntervalo)||0, n=parseInt(s.avalNum)||0;
  if(!start||n<=0) return 0;
  if(!Array.isArray(s.avaliacoes)) s.avaliacoes=[];
  s.avaliacoes=s.avaliacoes.filter(function(a){
    var vazio=(!a.variaveis||!a.variaveis.length)&&!a.obs&&!a.tipo&&!a.bbch;
    return !(a.auto && vazio);
  });
  var temData={}; s.avaliacoes.forEach(function(a){ if(a.data) temData[a.data]=true; });
  var add=0;
  for(var i=0;i<n;i++){
    var d=(iv>0)?_isoShift(start,i*iv):start;
    if(temData[d]) continue;
    s.avaliacoes.push({id:uid(),data:d,tipo:'',bbch:'',obs:'',variaveis:[],tipos:{},notas:{},auto:true});
    temData[d]=true; add++;
  }
  return add;
}

}

/* ===================== AUTO-CARIMBO (data/hora + GPS + clima + NDVI no registro) ===================== */
var APP_VER='matriz', _lastGps=null;
function _carimboFind(qid,sid,recId,kind){
  var sts=(data[qid]&&data[qid].estudos)||[];
  for(var i=0;i<sts.length;i++){ if(sts[i].id===sid){
    var arr=(kind==='apl')?(sts[i].aplicacoes||[]):(sts[i].avaliacoes||[]);
    for(var j=0;j<arr.length;j++){ if(arr[j].id===recId) return arr[j]; }
  } }
  return null;
}
function _carimboSet(qid,sid,recId,kind,field,val){
  var r=_carimboFind(qid,sid,recId,kind); if(!r) return;
  if(!r.carimbo) r.carimbo={};
  r.carimbo[field]=val; try{ save(); }catch(e){}
  try{ if(curV===qid && curSid===sid && document.getElementById('sdOvl') && document.getElementById('sdOvl').classList.contains('open')) openStudyDetail(qid,sid); }catch(e){}
}
function _carimboLoc(cb){
  if(!navigator.geolocation){ cb(null); return; }
  gpsBest({target:10, maxWait:8000, maxAcc:120}, null, function(b){
    if(b){ _lastGps={lat:b.lat,lng:b.lng,acc:b.acc,ts:Date.now()}; cb({lat:b.lat,lng:b.lng,acc:b.acc}); }
    else cb(_lastGps?{lat:_lastGps.lat,lng:_lastGps.lng,acc:_lastGps.acc,cache:true}:null);
  });
}
function _stationMacForQuadra(qid){
  if(!_climaStations||!_climaStations.length) return null;
  var loc=(typeof QLOCAL==='object'&&QLOCAL&&QLOCAL[qid])||(typeof HOME_LOCAL!=='undefined'?HOME_LOCAL:null);
  var nm=_climaNorm((typeof LOCAIS==='object'&&LOCAIS&&loc&&LOCAIS[loc]&&LOCAIS[loc].nome)||''); if(!nm) return null;
  var i,k;
  for(i=0;i<_climaStations.length;i++){ var sn=_climaNorm(_climaStations[i].name); if(sn&&(sn.indexOf(nm)>=0||nm.indexOf(sn)>=0)) return _climaStations[i].mac; }
  var toks=nm.match(/[a-z]{4,}/g)||[];
  for(i=0;i<_climaStations.length;i++){ var s2=_climaNorm(_climaStations[i].name); for(k=0;k<toks.length;k++){ if(s2.indexOf(toks[k])>=0) return _climaStations[i].mac; } }
  return null;
}
function _carimboClima(qid, cb){
  var ctr=quadraCenter(qid);
  function openMeteo(){
    if(!ctr){ cb(null); return; }
    var url='https://api.open-meteo.com/v1/forecast?latitude='+ctr[0].toFixed(4)+'&longitude='+ctr[1].toFixed(4)+'&current=temperature_2m,relative_humidity_2m,dew_point_2m,precipitation,surface_pressure,wind_speed_10m,wind_gusts_10m,wind_direction_10m,vapour_pressure_deficit,shortwave_radiation&timezone=America%2FSao_Paulo';
    fetch(url).then(function(r){return r.json();}).then(function(j){ var c=j&&j.current; if(!c){cb(null);return;}
      cb({fonte:'openmeteo',hora:c.time,temp:c.temperature_2m,umidade:c.relative_humidity_2m,orvalho:c.dew_point_2m,vpd:c.vapour_pressure_deficit,pressao:c.surface_pressure,vento:c.wind_speed_10m,rajada:c.wind_gusts_10m,vento_dir:c.wind_direction_10m,chuva:c.precipitation,solar:c.shortwave_radiation}); }).catch(function(){ cb(null); });
  }
  function station(){
    var mac=_stationMacForQuadra(qid); if(!mac){ openMeteo(); return; }
    fetch(NDVI_PROXY+'/clima?mac='+encodeURIComponent(mac)).then(function(r){return r.json();}).then(function(d){
      if(!d||d.error){ openMeteo(); return; }
      function v(n){ return (n&&n.value!=null)?n.value:null; }
      cb({fonte:'estacao',mac:mac,hora:d.time,temp:v(d.temp),umidade:v(d.humidity),orvalho:v(d.dew_point),vpd:v(d.vpd),pressao:v(d.pressure),vento:v(d.wind_speed),rajada:v(d.wind_gust),vento_dir:v(d.wind_dir),chuva:v(d.rain_day),solar:v(d.solar)});
    }).catch(function(){ openMeteo(); });
  }
  if(_climaStations){ station(); }
  else { fetch(NDVI_PROXY+'/clima/estacoes').then(function(r){return r.json();}).then(function(arr){ if(Array.isArray(arr))_climaStations=arr; station(); }).catch(openMeteo); }
}

function _avMeans(study, av){

  var m={}; Object.keys(sum).forEach(function(k){ m[k]={}; vars.forEach(function(v){ if(cnt[k]&&cnt[k][v]) m[k][v]=sum[k][v]/cnt[k][v]; }); }); return m;

/* ===================== BACKUPS LOCAIS (rede de segurança: snapshot antes de ações destrutivas) ===================== */
function safetySnap(){
  try{ if(typeof ensureLocais==='function') ensureLocais(); }catch(e){}
  return { ts:Date.now(),
    data:(typeof data!=='undefined'?data:{}),
    qgeo:(typeof QGEO!=='undefined'?QGEO:null),
    georef:(typeof _geo!=='undefined'?_geo:null),
    locais:(typeof LOCAIS!=='undefined'?LOCAIS:null),
    qlocal:(typeof QLOCAL!=='undefined'?QLOCAL:null),
    qnome:(typeof QNOME!=='undefined'?QNOME:null),
    randomizacoes:(typeof RZLIB!=='undefined'?RZLIB:[]) };
}
function _safetyCounts(s){ var d=s.data||{}, est=0,ap=0,av=0;
  Object.keys(d).forEach(function(k){ (d[k].estudos||[]).forEach(function(e){ est++; ap+=(e.aplicacoes||[]).length; av+=(e.avaliacoes||[]).length; }); });
  return { quadras:(s.qgeo?Object.keys(s.qgeo).length:Object.keys(d).length), locais:(s.locais?Object.keys(s.locais).length:0), estudos:est, aplic:ap, aval:av };
}
function safetyList(){ try{ return JSON.parse(localStorage.getItem('iracema-safety')||'[]'); }catch(e){ return []; } }
function safetyBackup(motivo){
  try{
    var arr=safetyList();
    var snap=JSON.parse(JSON.stringify(safetySnap()));
    snap.motivo=motivo||''; snap.counts=_safetyCounts(snap);
    arr.push(snap);
    while(arr.length>10) arr.shift();
    try{ localStorage.setItem('iracema-safety', JSON.stringify(arr)); }
    catch(e){ while(arr.length>2){ arr.shift(); try{ localStorage.setItem('iracema-safety', JSON.stringify(arr)); break; }catch(e2){} } }
  }catch(e){}
}
function safetyApply(snap){
  if(!snap) return;
  safetyBackup('antes de restaurar');
  try{
    if(snap.data){ data=snap.data; try{ localStorage.setItem('iracema-v7', JSON.stringify(data)); }catch(e){} }
    if(snap.qgeo){ QGEO=snap.qgeo; if(typeof saveQGEO==='function') saveQGEO(); }
    if(snap.georef){ _geo=snap.georef; if(typeof saveGeoref==='function') saveGeoref(_geo); }
    if(snap.locais){ LOCAIS=snap.locais; if(typeof saveLocais==='function') saveLocais(); }
    if(snap.qlocal){ QLOCAL=snap.qlocal; if(typeof saveQLocal==='function') saveQLocal(); }
    if(snap.qnome){ QNOME=snap.qnome; if(typeof saveQNome==='function') saveQNome(); }
    if(Array.isArray(snap.randomizacoes)){ RZLIB=normalizeRZLib(snap.randomizacoes); saveRZLib(); }
    if(typeof ensureLocais==='function'){ ensureLocais(); if(typeof buildLocalChip==='function') buildLocalChip(); }
    _cloudReplace=true; /* restauração substitui o estado (grava sem merge) */
    save(); render(); if(typeof updateAgendaBadge==='function') updateAgendaBadge();
  }catch(e){ alert('Erro ao restaurar: '+e.message); }
}

function cloudHistoryRestore(hid){

/* Override quadraHasAlert para usar v2 */

quadraHasAlert=function(qid){

  for(var i=0;i<q.estudos.length;i++){
    var s=normalizeStudy(q.estudos[i]);
